<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ralph HTML App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="counter-container">
      <div class="counter-row">
        <button type="button" data-testid="decrement-button" class="counter-button">-</button>
        <div data-testid="counter-value" class="counter-value">0</div>
        <button type="button" data-testid="increment-button" class="counter-button">+</button>
      </div>
      <button type="button" data-testid="reset-button" class="reset-button">Reset</button>
    </div>
    <script>
      let counterValue = 0;

      const counterDisplay = document.querySelector("[data-testid='counter-value']");
      const incrementButton = document.querySelector("[data-testid='increment-button']");
      const decrementButton = document.querySelector("[data-testid='decrement-button']");
      const resetButton = document.querySelector("[data-testid='reset-button']");

      function updateDisplay() {
        counterDisplay.textContent = counterValue;
        counterDisplay.classList.remove("negative", "positive", "zero");
        if (counterValue < 0) {
          counterDisplay.classList.add("negative");
        } else if (counterValue > 0) {
          counterDisplay.classList.add("positive");
        } else {
          counterDisplay.classList.add("zero");
        }
      }

      incrementButton.addEventListener("click", () => {
        counterValue++;
        updateDisplay();
      });

      decrementButton.addEventListener("click", () => {
        counterValue--;
        updateDisplay();
      });

      resetButton.addEventListener("click", () => {
        counterValue = 0;
        updateDisplay();
      });

      // Initialize color class on page load
      updateDisplay();
    </script>
  </body>
</html>
